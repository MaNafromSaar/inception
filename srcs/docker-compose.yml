services:
  # ─── Nginx (Reverse Proxy + TLS termination) ────────────────────────
  nginx:
    image: inception-nginx:idc
    container_name: inception-nginx
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    ports:
      - "443:443"
      - "8081:8081"
    volumes:
      - wordpress_data:/var/www/html:ro
      - ../html:/var/www/static:ro
    networks:
      - inception_network
    depends_on:
      wordpress:
        condition: service_healthy
    restart: always
    env_file:
      - .env

  # ─── WordPress + PHP-FPM ────────────────────────────────────────────
  wordpress:
    image: inception-wordpress:idc
    container_name: inception-wordpress
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception_network
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ─── MariaDB ────────────────────────────────────────────────────────
  mariadb:
    image: inception-mariadb:idc
    container_name: inception-mariadb
    build: ./requirements/mariadb
    env_file: .env
    networks:
      - inception_network
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: always
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Redis (Bonus: cache) ──────────────────────────────────────────
  redis:
    image: inception-redis:idc
    container_name: inception-redis
    build: ./requirements/redis
    env_file: .env
    networks:
      - inception_network
    restart: always
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ─── Adminer (Bonus: DB management) ────────────────────────────────
  adminer:
    image: inception-adminer:idc
    container_name: inception-adminer
    build: ./requirements/adminer
    ports:
      - "8080:8080"
    networks:
      - inception_network
    restart: always
    depends_on:
      mariadb:
        condition: service_healthy

  # ─── FTP Server (Bonus: file access) ───────────────────────────────
  ftp:
    image: inception-ftp:idc
    container_name: inception-ftp
    build:
      context: ./requirements/ftp
      dockerfile: Dockerfile
    ports:
      - "20:20"
      - "21:21"
      - "21000-21010:21000-21010"
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception_network
    depends_on:
      wordpress:
        condition: service_healthy
    restart: always
    env_file:
      - .env

# ─── Networks ──────────────────────────────────────────────────────────
networks:
  inception_network:
    driver: bridge
    name: inception_network

# ─── Volumes ──────────────────────────────────────────────────────────
# Default mode: Docker-managed volumes (portable, works on any VM).
# For host-bind mounts (42 subject), run: make up-host
volumes:
  wordpress_data:
    driver: local
  mariadb_data:
    driver: local
